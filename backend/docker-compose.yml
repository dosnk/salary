# 三人行吊顶管理系统 - Docker Compose 部署配置
#
# 使用方法:
#   docker compose up -d        # 启动所有服务
#   docker compose logs -f      # 查看日志
#   docker compose down         # 停止所有服务
#   docker compose restart app  # 重启后端
#
# 热重载说明:
#   后端源码目录已挂载到容器中，修改NAS上的代码文件后，
#   nodemon会自动检测变化并重启应用，无需手动重建镜像。
#   仅在package.json变化时需要重新构建: docker compose build app
#
# 首次部署:
#   1. 修改 .env.docker 中的密码和密钥
#   2. docker compose up -d
#   3. docker compose exec app node scripts/init-db.js
#   4. docker compose exec app node scripts/init-ai-tables.js
#   5. docker compose exec app node scripts/seed-materials.js
#   6.version: "3.8"

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    container_name: salary-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-salary}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sj27fsAy7rSDDss6}
      POSTGRES_DB: ${DB_NAME:-salary}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 端口仅绑定到127.0.0.1，禁止局域网/公网直接访问数据库
    # 容器间通过Docker内部网络通信，app服务通过db:5432连接
    # 如需外部工具调试，可临时改为 "5433:5432" 或使用SSH端口转发
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-salary}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: salary-redis
    restart: unless-stopped
    # 启用Redis密码认证，防止未授权访问
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-sj27fsRedis2026}
    volumes:
      - redisdata:/data
    # 端口仅绑定到127.0.0.1，禁止局域网/公网直接访问Redis
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      # 健康检查需带密码，否则AUTH失败
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sj27fsRedis2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js 后端应用（支持热重载）
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # 使用宿主机网络构建，绕过Docker DNS隔离问题
      network: host
    container_name: salary-app
    restart: unless-stopped
    # DNS配置（解决NAS环境DNS解析不稳定）
    dns:
      - 223.5.5.5
      - 8.8.8.8
      - 114.114.114.114
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_USER=${DB_USER:-salary}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-salary}
      - DB_PASSWORD=${DB_PASSWORD:-sj27fsAy7rSDDss6}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sj27fsRedis2026}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - NODE_ENV=production
      - LOG_DIR=./logs
      - SERVER_URL=${SERVER_URL:-http://localhost:9393}
    env_file:
      - .env.docker
    volumes:
      # 挂载源码目录，实现热重载
      # 修改NAS上的代码文件后，nodemon自动检测并重启
      - ./:/app
      # node_modules使用匿名卷，保留容器内安装的依赖
      # 避免被宿主机（可能不存在的）node_modules覆盖
      # 注意：匿名卷为空时，容器启动会从 /opt/node_modules_seed 自动恢复
      - /app/node_modules
      - app-logs:/app/logs
      # 临时上传文件目录（koaBody中转使用，无需持久化）
      - app-temp:/app/temp
      # 附件最终存储目录，明确映射到宿主机 ./upload
      # 后端按 /app/upload/YYYYMM/工程名/uuid.ext 结构存储
      # 宿主机可直接在 ./upload 目录查看和备份附件
      - ./upload:/app/upload
    ports:
      - "${APP_PORT:-9393}:3000"
    # 启动命令：root启动→修复权限→降权到node运行应用
    # 1. 修复挂载卷目录权限（绑定挂载和命名卷默认root归属，node用户无法写入）
    # 2. 检查node_modules完整性（校验生产依赖dotenv），残缺则从种子副本恢复
    # 3. 通过su-exec降权到node用户运行 node index.js（生产环境不使用nodemon，避免文件监控开销）
    command: >-
      sh -c "chown -R node:node /app/logs /app/temp /app/upload /app/node_modules 2>/dev/null || true;
      if [ ! -d /app/node_modules/dotenv ]; then
        echo 'node_modules不完整，从种子副本恢复...';
        rm -rf /app/node_modules;
        cp -r /opt/node_modules_seed /app/node_modules;
        chown -R node:node /app/node_modules;
      fi;
      exec su-exec node node index.js"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  app-logs:
    driver: local
  app-temp:
    driver: local
